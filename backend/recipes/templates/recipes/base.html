<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cocktail Recipes{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
    .recipe-grid {
        display: grid;
        grid-template-columns: repeat(1, 1fr);
        gap: 20px;
        margin-top: 20px;
    }

    /* Картыг бүтэн өндөртэй, товчийг доор нь байлгах тохиргоо */
    .recipe-grid article {
        display: flex;
        flex-direction: column;
        height: 100%;
        margin-bottom: 0; 
    }

    .recipe-grid article p {
        flex-grow: 1;
    }

    @media (min-width: 600px) {
        .recipe-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 992px) {
        .recipe-grid { grid-template-columns: repeat(3, 1fr); }
    }
</style>
</style>
</head>
<body>
    <nav class="container">
        <ul>
            <li><strong>🍸 Cocktail Bar</strong></li>
        </ul>
        <ul>
            <li><a href="{% url 'recipe_list' %}">Нүүр хуудас</a></li>
            <li><a href="/admin/" target="_blank">Админ</a></li>
        </ul>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="container">
        <small>© 2026 Cocktail Recipe App</small>
    </footer>
</body>
</html>
